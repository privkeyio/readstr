[book]
title = "Readstr Documentation"
authors = ["PrivKey LLC"]
description = "Google Reader-style aggregator for RSS feeds and Nostr long-form content"
src = "docs"
language = "en"

[output.html]
git-repository-url = "https://github.com/privkeyio/readstr"
edit-url-template = "https://github.com/privkeyio/readstr/edit/main/docs/{path}"
# Theme (default-theme, site-url) is enforced by the docs.privkey.io aggregator
# at build time; see github.com/privkeyio/docs.

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
