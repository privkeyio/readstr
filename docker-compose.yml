services:
  postgres:
    image: postgres:15
    container_name: readstr-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-readstr}
      POSTGRES_USER: ${POSTGRES_USER:-nostr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - nostr-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: readstr-app
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-nostr_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-readstr}
      - DEFAULT_RELAYS=wss://relay.damus.io,wss://nos.lol,wss://relay.nostr.band
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - nostr-network

  caddy:
    image: caddy:2-alpine
    container_name: readstr-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - nostr-network

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  nostr-network:
    driver: bridge